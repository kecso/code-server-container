name: Build image

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: code-server-container:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — tools present
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /bin/bash code-server-container:ci \
            -c 'set -euo pipefail; command -v agent; command -v python3; command -v node; command -v nodemon; command -v gcc; python3 --version; node --version'
